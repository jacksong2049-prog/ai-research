name: Issue Claim

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

jobs:
  claim:
    if: github.event.comment.body == '/claim'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const commenter = context.payload.comment.user.login;
            const issueNum = issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Skip PRs and non-bug issues
            if (issue.pull_request) {
              console.log("PRs cannot be claimed");
              return;
            }

            // Check if already assigned
            if (issue.assignee) {
              await github.rest.issues.createComment({
                issue_number: issueNum, owner, repo,
                body: `⛔ @${commenter} 该 Issue 已被 @${issue.assignee.login} 认领。`
              });
              return;
            }

            // Assign
            await github.rest.issues.addAssignees({
              issue_number: issueNum, owner, repo,
              assignees: [commenter]
            });

            // Add label
            try {
              await github.rest.issues.addLabels({
                issue_number: issueNum, owner, repo,
                labels: ["in-progress"]
              });
            } catch (e) {}

            // Calculate deadline (7 days)
            const deadline = new Date(Date.now() + 7 * 86400000);
            const deadlineStr = deadline.toISOString().slice(0, 10);

            // Comment confirmation
            await github.rest.issues.createComment({
              issue_number: issueNum, owner, repo,
              body: `✅ @${commenter} 已成功认领 Issue #${issueNum}！

📅 截止日期: **${deadlineStr}**（7 天内）
📮 请在此 Issue 下提交修复代码或创建 PR。

> 💡 虚拟代币仅供学习排名使用，不可兑换为现金或加密货币。祝你好运！🚀`
            });

            console.log(`#${issueNum} claimed by @${commenter}`);
