name: Notifications

on:
  workflow_call:
    inputs:
      event:
        required: true
        type: string
        description: "pr_review|issue_eval|new_issue|payout"
      user:
        required: true
        type: string
      issue:
        required: true
        type: string
      score:
        required: true
        type: string

permissions:
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post Inline Notification
        uses: actions/github-script@v7
        with:
          script: |
            const event = "${{ inputs.event }}";
            const user = "${{ inputs.user }}";
            const issue = "${{ inputs.issue }}";
            const score = "${{ inputs.score }}";

            let msg = "";
            if (event === "pr_review") {
              msg = `🔔 @${user} 提交了 PR #${issue}，评分 **${score}** 分`;
            } else if (event === "issue_eval") {
              msg = `🔔 @${user} 在 Issue #${issue} 提交了代码，评分 **${score}** 分`;
            } else if (event === "new_issue") {
              msg = `🔔 @${user} 创建了 Issue #${issue} (包含修复代码)`;
            } else if (event === "payout") {
              msg = `📊 Bounty 排行榜已更新！`;
            }

            // Post notification as a comment on issue #1 (welcome/notice board)
            try {
              await github.rest.issues.createComment({
                issue_number: 1,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: msg + `\n\n---\n*🤖 自动通知*`
              });
            } catch (e) {
              console.log("Could not post to issue #1: " + e.message);
            }

            // Also try Discord webhook if configured
            const discordUrl = process.env.DISCORD_WEBHOOK;
            if (discordUrl) {
              try {
                const payload = {
                  content: msg,
                  username: "AI Training Bot",
                  avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                };
                await fetch(discordUrl, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify(payload)
                });
              } catch (e) {
                console.log("Discord notify failed: " + e.message);
              }
            }
