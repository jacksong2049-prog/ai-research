name: Hall of Fame

on:
  schedule:
    - cron: "0 6 1 * *"   # 每月1日 UTC 06:00 = 北京 14:00
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  hall-of-fame:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Hall of Fame
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = new Date();
            const month = now.toLocaleString("default", { month: "long" });
            const year = now.getFullYear();
            const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);

            // Read BOUNTY_LEDGER
            let ledger = {};
            try {
              const { data: f } = await github.rest.repos.getContent({
                owner, repo, path: "BOUNTY_LEDGER.json"
              });
              ledger = JSON.parse(Buffer.from(f.content, "base64").toString());
            } catch (e) {
              console.log("No ledger found");
            }

            // Read TIME_LEDGER
            let tledger = {};
            try {
              const { data: f } = await github.rest.repos.getContent({
                owner, repo, path: "TIME_LEDGER.json"
              });
              tledger = JSON.parse(Buffer.from(f.content, "base64").toString());
            } catch (e) {}

            // Get recent PRs merged in last month
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: "closed", per_page: 30,
              sort: "updated", direction: "desc"
            });
            const monthPRs = prs.filter(p => p.merged_at && new Date(p.merged_at) > lastMonth);

            // Build report
            let report = `# 🏆 Hall of Fame — ${month} ${year}\n\n`;

            // Top contributors
            report += `## 🥇 Top Contributors\n\n`;
            report += `| 排名 | 参与者 | 总收入 |\n`;
            report += `|:---:|:------:|:-----:|\n`;
            const sorted = Object.entries(ledger).sort((a, b) => b[1].total - a[1].total);
            const medals = ["🥇", "🥈", "🥉"];
            for (let i = 0; i < Math.min(sorted.length, 10); i++) {
              const [user, data] = sorted[i];
              const cnt = Array.isArray(data.submissions) ? data.submissions.length : data.task_count || 0;
              report += `| ${medals[i] || `#${i+1}`} | @${user} | **$${data.total}** (${cnt} tasks) |\n`;
            }

            // Fastest fixes
            report += `\n## ⚡ Fastest Fixes\n\n`;
            report += `| 参与者 | Issue | 耗时 |\n`;
            report += `|:-----:|:----:|:----:|\n`;
            const allFast = [];
            for (const [user, data] of Object.entries(tledger)) {
              for (const t of data.tasks) {
                allFast.push({ user, issue: t.issue, sec: t.elapsedSec });
              }
            }
            allFast.sort((a, b) => a.sec - b.sec);
            for (let i = 0; i < Math.min(allFast.length, 5); i++) {
              const t = allFast[i];
              const timeStr = t.sec < 3600
                ? `${Math.floor(t.sec/60)}m ${t.sec%60}s`
                : `${Math.floor(t.sec/3600)}h ${Math.floor((t.sec%3600)/60)}m`;
              report += `| @${t.user} | #${t.issue} | ${timeStr} |\n`;
            }

            // Recent activity
            report += `\n## 📋 Recent Merged PRs (${monthPRs.length})\n\n`;
            for (const pr of monthPRs.slice(0, 10)) {
              report += `- [#${pr.number}](${pr.html_url}) ${pr.title.substring(0, 60)} by @${pr.user.login}\n`;
            }

            // Stats
            const totalBounty = sorted.reduce((s, u) => s + u[1].total, 0);
            report += `\n## 📊 Monthly Stats\n\n`;
            report += `| Metric | Value |\n`;
            report += `|:------|:-----:|\n`;
            report += `| Total Contributors | ${sorted.length} |\n`;
            report += `| Total Bounty Distributed | **$${totalBounty}** |\n`;
            report += `| PRs Merged This Month | ${monthPRs.length} |\n`;
            report += `| Fastest Fix | ${allFast.length > 0 ? Math.floor(allFast[0].sec/60) + "m" : "N/A"} |\n`;

            report += `\n---\n> 💡 虚拟代币仅供学习排名使用，不可兑换为现金或加密货币。感谢每一位参与者的贡献！🚀\n`;

            // Create Hall of Fame issue
            await github.rest.issues.create({
              owner, repo,
              title: `🏆 Hall of Fame — ${month} ${year}`,
              body: report,
              labels: ["hall-of-fame"]
            });

            console.log("Hall of Fame created!");
