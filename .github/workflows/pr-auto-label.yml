name: PR Auto-Label & Rate-Limit
on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      scanAll:
        description: "Scan and label ALL open PRs"
        required: false
        type: boolean
        default: false
      closeShanaBooBulk:
        description: "Close all ShanaBoo bot PRs (cleanup mode)"
        required: false
        type: boolean
        default: false

permissions:
  pull-requests: write
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ── Known Bots ──
            const knownBots = {
              "genesisrevelationinc-debug": { label: "shanaboo-bot", desc: "ShanaBoo autonomous fix agent" },
              "taibaihu": { label: "crazy-monkey-bot", desc: "Crazy Monkey auto-patch agent" },
            };

            // ── Vulnerability Patterns ──
            const vulnPatterns = [
              { label: "sql-injection", keywords: ["sql", "sqli"] },
              { label: "xss", keywords: ["xss", "cross-site scripting"] },
              { label: "csrf", keywords: ["csrf", "cross-site request forgery"] },
              { label: "ssrf", keywords: ["ssrf", "server-side request forgery"] },
              { label: "command-injection", keywords: ["command injection", "rce", "remote code", "code execution"] },
              { label: "path-traversal", keywords: ["path traversal", "directory traversal"] },
              { label: "xxe", keywords: ["xxe", "xml external entity"] },
              { label: "idor", keywords: ["idor", "insecure direct object"] },
              { label: "deserialization", keywords: ["deserialization", "pickle", "unsafe deserialization"] },
              { label: "jwt", keywords: ["jwt", "json web token"] },
              { label: "prototype-pollution", keywords: ["prototype pollution"] },
              { label: "race-condition", keywords: ["race condition", "race window"] },
              { label: "ssti", keywords: ["ssti", "template injection"] },
              { label: "hardcoded-secrets", keywords: ["hardcoded", "secret", "credential"] },
            ];

            // ── Helper: compute labels for a PR ──
            function computeLabels(pr) {
              const title = (pr.title || "").toLowerCase();
              const body = (pr.body || "").toLowerCase();
              const author = (pr.user?.login || "").toLowerCase();
              const labels = [];

              // Bot detection
              if (knownBots[author]) {
                labels.push(knownBots[author].label);
                labels.push("bot");
              } else if (title.includes("[shanaboo]") || body.includes("shanaboo")) {
                labels.push("shanaboo-bot");
                labels.push("bot");
              }

              // Vulnerability type
              for (const pattern of vulnPatterns) {
                if (pattern.keywords.some(k => title.includes(k) || body.includes(k))) {
                  labels.push(pattern.label);
                }
              }

              // Bounty
              const bountyMatch = title.match(/\$(\d+)/);
              if (bountyMatch) {
                labels.push("bounty");
                const amt = parseInt(bountyMatch[1]);
                if (amt <= 25) labels.push("difficulty: easy");
                else if (amt <= 50) labels.push("difficulty: medium");
                else if (amt <= 100) labels.push("difficulty: hard");
                else labels.push("difficulty: expert");
              }

              if (pr.draft === false) {
                labels.push("needs-review");
              }

              return labels;
            }

            // ── Helper: label a single PR ──
            async function labelPR(prNumber) {
              const { data: existing } = await github.rest.issues.listLabelsOnIssue({
                issue_number: prNumber, owner, repo
              });
              return existing.map(l => l.name);
            }

            async function addLabels(prNumber, labels) {
              if (labels.length === 0) return;
              const existing = await labelPR(prNumber);
              const toAdd = labels.filter(l => !existing.includes(l));
              if (toAdd.length > 0) {
                await github.rest.issues.addLabels({
                  issue_number: prNumber, owner, repo, labels: toAdd
                });
                return toAdd;
              }
              return [];
            }

            // ── MODE 1: Event-triggered (single PR) ──
            if (context.payload.pull_request && !context.payload.inputs?.scanAll && !context.payload.inputs?.closeShanaBooBulk) {
              const pr = context.payload.pull_request;
              const labels = computeLabels(pr);
              const added = await addLabels(pr.number, labels);
              console.log(`Labeled PR #${pr.number}: ${added.join(", ") || "none needed"}`);
              return;
            }

            // ── MODE 2: scanAll ──
            if (context.payload.inputs?.scanAll) {
              console.log("Scanning ALL open PRs...");
              const { data: prs } = await github.rest.pulls.list({
                owner, repo, state: "open", per_page: 100
              });
              let labeled = 0;
              for (const pr of prs) {
                const labels = computeLabels(pr);
                const added = await addLabels(pr.number, labels);
                if (added.length > 0) labeled++;
                console.log(`PR #${pr.number} (@${pr.user.login}): +${added.join(",") || "none"}`);
              }
              console.log(`Done. Labeled ${labeled}/${prs.length} PRs`);
              return;
            }

            // ── MODE 3: closeShanaBooBulk ──
            if (context.payload.inputs?.closeShanaBooBulk) {
              console.log("Bulk-closing ShanaBoo PRs...");
              const { data: prs } = await github.rest.pulls.list({
                owner, repo, state: "open", per_page: 100
              });
              let closed = 0;
              const shanabooIssues = new Set();

              for (const pr of prs) {
                const author = (pr.user?.login || "").toLowerCase();
                if (author !== "genesisrevelationinc-debug") continue;

                // Label first
                const labels = computeLabels(pr);
                await addLabels(pr.number, labels);

                // Track which issue this PR claims to fix
                const body = (pr.body || "");
                const match = body.match(/Closes\s+#(\d+)/i);
                if (match) {
                  const issueNum = parseInt(match[1]);
                  if (shanabooIssues.has(issueNum)) {
                    // Duplicate — close it
                    await github.rest.pulls.update({
                      pull_number: pr.number, owner, repo,
                      state: "closed"
                    });
                    await github.rest.issues.createComment({
                      issue_number: pr.number, owner, repo,
                      body: `❌ 已关闭（重复提交）。已有其他 PR 声称修复同个 Issue #${issueNum}。`
                    });
                    closed++;
                    console.log(`CLOSED PR #${pr.number} (duplicate of issue #${issueNum})`);
                  } else {
                    shanabooIssues.add(issueNum);
                  }
                }
              }
              console.log(`Done. Closed ${closed} duplicate ShanaBoo PRs`);
              return;
            }
